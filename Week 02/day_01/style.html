<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
        /* internal css  , * is a universal selector that selects all elements in the document */
        *{
            padding: 0;
            margin: 0;
        }

        #hero{
            width: 100vw;
            height: 100vh;
            background-image: url(https://images.pexels.com/photos/291732/pexels-photo-291732.jpeg);
            background-size: cover;
            background-position: bottom;
            
        }
        section h1{
            color: white;
            font-size: 5rem;
            padding: 20px;
            padding-top: 25vh;
            font-family: sans-serif;
            text-shadow: 1px 1px 6px black;    /* To make clear the text from background image hehehe */
        }
        button{
            background-color: #0472bb;
            padding: 15px 15px;
            margin: 0px 20px 0px 25px;
            color: white;
            font-size: 1.75rem;
            text-shadow: 1px 1px 2px black;
            box-shadow: 1px 1px 2px black;
            border: none;
        }

    </style>
    <title>Inline Css</title>
</head>
<body>
<section id="hero">
    <h1>Explore <br/> Northern Pakistan </h1>
    <button>Explore Now <i class="ri-arrow-right-circle-fill"></i></button>

</section>        

</body>
</html>
